name: Deploy to EC2

# Every push/merge to main redeploys the running server on EC2 via AWS SSM.
# Auth is short-lived GitHub OIDC -> a scoped AWS role (no stored credentials,
# no inbound ports). Config values are non-secret repo *variables* (vars.*):
#   AWS_DEPLOY_ROLE_ARN, AWS_REGION, EC2_INSTANCE_ID
# Safe for a public repo: secrets/OIDC are not exposed to fork PRs, and only
# collaborators can push to main.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deploys against the box at once.
concurrency:
  group: deploy-ec2
  cancel-in-progress: false

permissions:
  id-token: write # required to request the OIDC token
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Redeploy via SSM Run Command
        env:
          INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
        run: |
          set -euo pipefail

          # Redeploy script run as root on the box (single-quoted so $PATH is
          # expanded there, not in this runner).
          printf '%s' '{"commands":["set -euo pipefail","export HOME=/root","export PATH=/usr/local/bin:/usr/bin:/bin:$PATH","cd /opt/tour-de-france-mcp","git config --global --add safe.directory /opt/tour-de-france-mcp","git fetch --all --prune --quiet","git reset --hard origin/main","npm install --no-audit --no-fund","npm run build","systemctl restart tdf-mcp.service","sleep 2","systemctl is-active tdf-mcp.service"]}' > params.json

          CMD=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "GHA deploy ${GITHUB_SHA::7}" \
            --parameters file://params.json \
            --query "Command.CommandId" --output text)
          echo "SSM CommandId: $CMD"

          # Give SSM a moment to register the invocation, then wait for it.
          sleep 8
          aws ssm wait command-executed --command-id "$CMD" --instance-id "$INSTANCE_ID" || true

          STATUS=$(aws ssm get-command-invocation --command-id "$CMD" --instance-id "$INSTANCE_ID" --query Status --output text)
          echo "::group::remote stdout"
          aws ssm get-command-invocation --command-id "$CMD" --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text
          echo "::endgroup::"
          echo "::group::remote stderr"
          aws ssm get-command-invocation --command-id "$CMD" --instance-id "$INSTANCE_ID" --query StandardErrorContent --output text
          echo "::endgroup::"

          echo "Deploy status: $STATUS"
          [ "$STATUS" = "Success" ]

      - name: Smoke-test public endpoint
        run: |
          set -euo pipefail
          # initialize handshake should return the server info over HTTPS.
          BODY='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"gha","version":"1"}}}'
          OUT=$(curl -sS https://tour-de-france.andru.codes/mcp \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json, text/event-stream' \
            -d "$BODY")
          echo "$OUT" | grep -q 'tour-de-france-mcp' && echo "endpoint healthy" || { echo "endpoint check failed: $OUT"; exit 1; }
